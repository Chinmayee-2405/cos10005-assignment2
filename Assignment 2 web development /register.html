<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta name="description"content="Register for BELLY UP">

    <meta name="keywords"content="register, account, restaurant booking" >

    <meta name="author" content="Chinmayee Sharma">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Register | BELLY UP</title>

   <link rel="stylesheet" href="css/style.css">
   <script src="js/script.js" defer></script>
</head>

<body>

<div class="bg-glow"></div>

<header>

     <nav class="navbar">
         <div class="logo">BELLY UP</div>

        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="restaurants.html">Restaurants</a>
            <a href="recommend.html">Recommend</a>
            <a href="register.html">Register</a>
            <a href="reservation.html">Reservation</a>
            <a href="bill.html" class="active">Bill</a>
            <a href="about.html">About</a>
        </div>

    </nav>
    <section class="page-header">

        <h1>Create Account</h1>

        <p>
            Register to use BELLY UP
        </p>

    </section>

</header>

<main class="container">

<form
    id="registerForm"
    novalidate
>

<fieldset>

<legend>
Registration Details
</legend>

<div class="textinput">

<label for="username">
Username
</label>

<input
    id="username"
    type="text"
>

</div>

<div class="textinput">

<label for="regEmail">
Email Address
</label>

<input
    id="regEmail"
    type="email"
>

</div>

<div class="textinput">

<label for="regPhone">
Phone Number
</label>

<input
    id="regPhone"
    type="tel"
>

</div>

<div class="textinput">

<label for="password">
Password
</label>

<input
    id="password"
    type="password"
>

</div>

<div class="textinput">

<label for="confirmPassword">
Confirm Password
</label>

<input
    id="confirmPassword"
    type="password"
>

</div>

<div class="radioinput">

<span class="radiolabel">
Gender
</span>

<input
    type="radio"
    id="female"
    name="gender"
>

<label for="female">
Female
</label>

<input
    type="radio"
    id="male"
    name="gender"
>

<label for="male">
Male
</label>

<input
    type="radio"
    id="other"
    name="gender"
>

<label for="other">
Other
</label>

</div>

<div class="textinput">

<label for="dietPref">
Dietary Preference
</label>

<select id="dietPref">

<option value="">
Select preference
</option>

<option value="None">
None
</option>

<option value="Vegetarian">
Vegetarian
</option>

<option value="Vegan">
Vegan
</option>

<option value="Halal">
Halal
</option>

</select>

</div>

<div class="textinput">

<label for="country">
Country/Region
</label>

<input
    id="country"
    type="text"
>

</div>

</fieldset>

<p id="registerError" class="error"></p>

<div class="buttoninput">

<input
    type="submit"
    value="Register"
>

</div>

</form>

</main>

<footer>
    Created by Chinmayee Sharma | 2026
</footer>

</body>
</html>
