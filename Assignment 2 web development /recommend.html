<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Get restaurant recommendations using BELLY UP">
    <meta name="keywords" content="restaurant recommendation, Melbourne food, dining">
    <meta name="author" content="Chinmayee Sharma">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Recommend | BELLY UP</title>

    
    <link rel="stylesheet" href="css/style.css">
    <script src="js/script.js" defer></script>
</head>

<body>

<div class="bg-glow"></div>

<header>

    <nav class="navbar">
         <div class="logo">BELLY UP</div>

        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="restaurants.html">Restaurants</a>
            <a href="recommend.html">Recommend</a>
            <a href="register.html">Register</a>
            <a href="reservation.html">Reservation</a>
            <a href="bill.html" class="active">Bill</a>
            <a href="about.html">About</a>
        </div>

    </nav>

    <section class="page-header">

        <h1>Find Your Food Match</h1>

        <p>
            Choose your preferences and get a recommendation
        </p>

    </section>

</header>

<main class="container">

    <form id="recommendForm">

        <fieldset>

            <legend>Recommendation Form</legend>

            <div class="textinput">

                <label for="diet">
                    Dietary Preference
                </label>

                <select id="diet">

                    <option value="">
                        Select preference
                    </option>

                    <option value="none">
                        None
                    </option>

                    <option value="vegetarian">
                        Vegetarian
                    </option>

                    <option value="vegan">
                        Vegan
                    </option>

                    <option value="halal">
                        Halal
                    </option>

                </select>

            </div>

            <div class="textinput">

                <label for="budget">
                    Budget Range
                </label>

                <select id="budget">

                    <option value="">
                        Select budget
                    </option>

                    <option value="low">
                        Low
                    </option>

                    <option value="medium">
                        Medium
                    </option>

                    <option value="high">
                        High
                    </option>

                </select>

            </div>

            <div class="textinput">

                <label for="purpose">
                    Dining Purpose
                </label>

                <select id="purpose">

                    <option value="">
                        Select purpose
                    </option>

                    <option value="family">
                        Family
                    </option>

                    <option value="date">
                        Date
                    </option>

                    <option value="business">
                        Business
                    </option>

                    <option value="friends">
                        Friends
                    </option>

                </select>

            </div>

            <p id="recommendError" class="error"></p>

            <div class="buttoninput">

                <input
                    type="button"
                    value="Get Recommendation"
                    onclick="recommendRestaurant()"
                >

            </div>

        </fieldset>

    </form>

    <section
        id="recommendResult"
        class="result-box hidden"
    >

        <h2 id="resultName"></h2>

        <p id="resultDesc"></p>

        <a
            id="reserveRecommended"
            href="reservation.html"
            class="book-btn"
        >
            Reserve This Restaurant
        </a>

    </section>

</main>

<footer>
    Created by Chinmayee Sharma | 2026
</footer>

</body>
</html>
